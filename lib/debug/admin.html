<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bughunter · Phase-1 debug</title>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --panel2: #1c2330; --line: #2a3240;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --good: #3fb950;
    --warn: #d29922; --bad: #f85149; --mut: #6e7681;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--fg); display: flex; flex-direction: column; overflow: hidden; }
  code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  button, select { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
                   border-radius: 6px; padding: 4px 9px; font-size: 12px; cursor: pointer; }
  button:hover, select:hover { border-color: var(--accent); }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button { border: none; border-radius: 0; background: var(--panel); color: var(--dim); padding: 4px 11px; }
  .seg button.on { background: var(--accent); color: #04101f; font-weight: 600; }
  /* header */
  header { display: flex; align-items: center; gap: 12px; padding: 9px 14px; background: var(--panel);
           border-bottom: 1px solid var(--line); flex-wrap: wrap; flex: 0 0 auto; }
  header h1 { font-size: 15px; margin: 0; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 12px; }
  .tabbar { display: inline-flex; gap: 2px; }
  .tabbar button { background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0;
                   color: var(--dim); padding: 6px 14px; font-size: 13px; }
  .tabbar button.on { color: var(--fg); border-bottom-color: var(--accent); font-weight: 600; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.running { background: rgba(88,166,255,.15); color: var(--accent); }
  .badge.done { background: rgba(63,185,80,.15); color: var(--good); }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; background: var(--good); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(63,185,80,.5); } 70% { box-shadow: 0 0 0 6px rgba(63,185,80,0); } }
  .kpis { display: flex; gap: 16px; padding: 6px 14px; background: var(--bg); border-bottom: 1px solid var(--line); flex: 0 0 auto; flex-wrap: wrap; }
  .kpi b { font-size: 14px; } .kpi span { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  /* body: runs | stage | steps */
  .body { flex: 1; display: grid; grid-template-columns: var(--leftw, 250px) 1fr var(--rightw, 320px); min-height: 0; }
  .body.no-left { --leftw: 0px; } .body.no-right { --rightw: 0px; }
  .col { overflow-y: auto; overflow-x: hidden; background: var(--panel); }
  .col.left { border-right: 1px solid var(--line); } .col.right { border-left: 1px solid var(--line); }
  .no-left .col.left { border-right: none; } .no-right .col.right { border-left: none; }
  .hd { padding: 7px 12px; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
        border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 1; }
  /* runs list */
  .runrow { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--line); }
  .runrow:hover { background: var(--panel2); } .runrow.sel { background: rgba(88,166,255,.12); box-shadow: inset 3px 0 0 var(--accent); }
  .runrow .top { display: flex; align-items: center; gap: 6px; }
  .runrow .id { font-size: 12px; font-weight: 600; } .runrow .sub { color: var(--dim); font-size: 11px; margin-top: 2px; word-break: break-all; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; background: var(--good); } .sdot.run { background: var(--accent); }
  /* steps list */
  .steprow { padding: 6px 12px; cursor: pointer; border-bottom: 1px solid var(--line); }
  .steprow:hover { background: var(--panel2); } .steprow.sel { background: rgba(88,166,255,.10); box-shadow: inset 3px 0 0 var(--accent); }
  .steprow .line { display: flex; gap: 8px; align-items: baseline; }
  .steprow .n { color: var(--mut); font-size: 11px; min-width: 18px; } .steprow .lbl { flex: 1; min-width: 0; }
  .steprow.err .lbl { color: var(--bad); }
  .routelbl { padding: 5px 12px 2px; color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; border-top: 1px solid var(--line); }
  .stepdetail { margin: 8px 0 2px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; }
  .stepdetail h5 { margin: 8px 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--dim); }
  .stepdetail h5:first-child { margin-top: 0; }
  .reqrow { padding: 2px 0; } .method { display: inline-block; min-width: 40px; font-weight: 700; font-size: 11px; }
  .m-GET { color: var(--good); } .m-POST { color: var(--warn); } .m-PUT,.m-PATCH { color: var(--accent); } .m-DELETE { color: var(--bad); }
  .endpoint { color: var(--accent); }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
  .bar-row .nm { width: 52px; color: var(--dim); font-size: 11px; }
  .bar { height: 10px; background: var(--accent); border-radius: 3px; min-width: 2px; } .bar.settle { background: var(--warn); } .bar.snap { background: #a371f7; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; margin: 0 5px 4px 0; background: var(--panel2); border: 1px solid var(--line); }
  .tag.safe { color: var(--good); } .tag.destructive,.tag.auth,.tag.payment { color: var(--bad); }
  .muted { color: var(--dim); }
  /* stage */
  .stage { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .stagebar { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
  .stagebar .title { font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .stagebar .spacer { flex: 1; }
  .stagewrap { flex: 1; min-height: 0; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 16px; background: #0b0e13; }
  .frame { position: relative; line-height: 0; max-width: 100%; max-height: 100%; }
  .frame img { max-width: 100%; max-height: calc(100vh - 320px); display: block; border: 1px solid var(--line); border-radius: 4px; cursor: zoom-in; }
  .frame .box { position: absolute; border: 2px solid var(--bad); box-shadow: 0 0 0 2px rgba(248,81,73,.3); pointer-events: none; display: none; }
  .placard { color: var(--dim); text-align: center; padding: 40px; } .placard.err { color: var(--bad); }
  /* filmstrip */
  .strip { flex: 0 0 auto; border-top: 1px solid var(--line); background: var(--panel); padding: 10px 14px 14px; display: flex; align-items: center; gap: 12px; }
  .strip .tbtn { font-size: 15px; line-height: 1; padding: 4px 10px; }
  .track { position: relative; flex: 1; height: 40px; cursor: pointer; touch-action: none; }
  .rail-line { position: absolute; left: 0; right: 0; top: 26px; height: 2px; background: var(--line); border-radius: 2px; }
  .sep { position: absolute; top: 6px; height: 30px; width: 1px; background: var(--mut); opacity: .6; }
  .sep .rl { position: absolute; top: -4px; left: 3px; font-size: 9px; color: var(--dim); white-space: nowrap; }
  .pdot { position: absolute; top: 20px; width: 13px; height: 13px; margin-left: -6.5px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); cursor: pointer; }
  .pdot.error { background: var(--bad); } .pdot.danger { box-shadow: 0 0 0 2px var(--warn); }
  .pdot.cur { width: 19px; height: 19px; margin-left: -9.5px; top: 17px; z-index: 2; box-shadow: 0 0 0 3px rgba(88,166,255,.25); }
  .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); margin-left: -1px; z-index: 1; pointer-events: none; }
  .readout { min-width: 150px; text-align: right; color: var(--dim); font-size: 12px; }
  .tip { position: absolute; bottom: 44px; transform: translateX(-50%); background: #000; border: 1px solid var(--line); padding: 3px 7px; border-radius: 5px; font-size: 11px; white-space: nowrap; display: none; z-index: 3; }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
  #lb { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; z-index: 50; align-items: center; justify-content: center; padding: 24px; }
  #lb.open { display: flex; } #lb img { max-width: 96vw; max-height: 92vh; border: 1px solid var(--line); }
  .hide { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>bughunter</h1><span class="sub">Phase-1 debug</span>
  <span class="tabbar" id="tabs"><button data-tab="runs" class="on">Прогоны</button><button data-tab="tests">Тесты</button></span>
  <span id="runTarget" class="sub mono"></span>
  <span id="runStatus"></span>
  <span style="flex:1"></span>
  <button id="tLeft" title="toggle runs">⇤ прогоны</button>
  <button id="tRight" title="toggle steps">шаги ⇥</button>
  <label class="sub"><input type="checkbox" id="autoref" checked> live</label>
  <button id="refresh">↻</button>
</header>
<div class="kpis" id="kpis"></div>
<div class="body" id="bodyGrid">
  <div class="col left"><div class="hd">прогоны</div><div id="runsList"></div></div>
  <div class="stage">
    <div class="stagebar">
      <span class="title" id="stageTitle">—</span>
      <span class="spacer"></span>
      <span class="seg" id="frameSel"><button data-frame="before" class="on">before</button><button data-frame="after">after</button></span>
    </div>
    <div class="stagewrap" id="stageWrap"></div>
  </div>
  <div class="col right"><div class="hd">шаги</div><div id="stepsList"></div></div>
</div>
<div class="strip" id="strip">
  <button class="tbtn" id="prev" title="prev (←)">‹</button>
  <div class="track" id="track" tabindex="0" role="slider" aria-label="run timeline">
    <div class="rail-line"></div><div class="playhead" id="playhead" style="display:none"></div><div class="tip" id="tip"></div>
  </div>
  <button class="tbtn" id="next" title="next (→)">›</button>
  <div class="readout" id="readout">—</div>
</div>
<div id="testsView" class="hide"><div class="empty" style="padding-top:80px">Phase-2 тест-кейсы для этого прогона ещё не сняты.<br>Этот раздел переиспользует ту же сцену + полосу, когда появится <span class="mono">/gen</span>.</div></div>
<div id="lb"><img id="lbImg" alt=""></div>
<script type="module">
import { deriveSteps, clampIndex, dotLeftPct, indexFromClientX, boxFromRect, dotClass } from './scrub-math.mjs';

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const TOKEN = new URLSearchParams(location.search).get('t') || '';
const api = (p) => p + (p.includes('?') ? '&' : '?') + 't=' + encodeURIComponent(TOKEN);
async function jget(url) { const r = await fetch(api(url)); if (!r.ok) throw new Error(r.status); return r.json(); }

const S = { tab: 'runs', runs: [], runId: null, run: null, events: [], steps: [], i: 0, frame: 'before' };

async function loadRuns() {
  const { runs } = await jget('/api/runs');
  S.runs = runs || [];
  if (!S.runs.length) { $('#runsList').innerHTML = '<div class="empty">Пусто — запусти /recon.</div>'; $('#kpis').innerHTML = ''; return; }
  renderRunsList();
  if (!S.runId || !S.runs.some((r) => r.id === S.runId)) { S.runId = S.runs[0].id; await loadRun(true); }
  else if (S.run && S.run.status === 'running') await loadRun(false); // live-refresh the open run
}

function renderRunsList() {
  $('#runsList').innerHTML = S.runs.map((r) => {
    const st = r.stats || {};
    return `<div class="runrow ${r.id === S.runId ? 'sel' : ''}" data-id="${esc(r.id)}">
      <div class="top"><span class="sdot ${r.status === 'running' ? 'run' : ''}"></span><span class="id mono">${esc(r.id)}</span></div>
      <div class="sub">${esc(r.target || '')}</div>
      <div class="sub">${st.explored ?? '–'}/${st.discovered ?? '–'} explored · ${st.routes ?? '–'} routes</div></div>`;
  }).join('');
  $('#runsList').querySelectorAll('.runrow').forEach((el) => el.onclick = () => { if (el.dataset.id !== S.runId) { S.runId = el.dataset.id; loadRun(true); } });
}

async function loadRun(reset) {
  const data = await jget('/api/runs/' + S.runId);
  S.run = data.run; S.events = data.events || [];
  const steps = deriveSteps(S.events);
  const atEnd = reset || S.i >= S.steps.length - 1 || !S.steps.length;
  S.steps = steps;
  S.i = atEnd ? Math.max(0, steps.length - 1) : clampIndex(S.i, steps.length);
  renderRunsList(); renderHeader(); renderKpis(); renderSteps(); renderStrip(); renderStage();
}

function renderHeader() {
  const r = S.run || {};
  $('#runTarget').textContent = r.target || '';
  const live = r.status === 'running';
  $('#runStatus').innerHTML = r.id ? `<span class="badge ${live ? 'running' : 'done'}">${live ? '<span class="dot-live"></span>running' : 'done'}</span>` : '';
}
function lastStats() {
  for (let k = S.events.length - 1; k >= 0; k--) if (S.events[k].kind === 'frontier.emit' && S.events[k].payload.stats) return S.events[k].payload.stats;
  return (S.run && S.run.stats) || {};
}
function renderKpis() {
  const st = (S.run && S.run.stats) || lastStats();
  const edges = new Set(); let tot = 0, n = 0;
  for (const s of S.steps) { (s.requests || []).forEach((q) => edges.add(q.method + ' ' + q.urlPattern)); if (s.timings) { tot += s.timings.actMs; n++; } }
  const k = (v, l) => `<span class="kpi"><b>${v}</b> <span>${l}</span></span>`;
  $('#kpis').innerHTML = [k(`${st.explored ?? '–'}/${st.discovered ?? '–'}`, 'explored'), k(st.unreachable ?? '–', 'unreachable'),
    k(st.routes ?? '–', 'routes'), k(S.steps.length, 'acts'), k(edges.size, 'edges'), k(n ? Math.round(tot / n) + 'ms' : '–', 'avg act')].join('');
}

function stepDetailHtml(s) {
  const reqs = (s.requests || []).map((r) => `<div class="reqrow"><span class="method m-${esc(r.method)}">${esc(r.method)}</span> <span class="endpoint mono">${esc(r.urlPattern)}</span></div>`).join('') || '<div class="muted">no request caused</div>';
  const t = s.timings, w = (ms) => Math.max(2, Math.min(340, (ms || 0) * 1.2));
  const bars = t ? `<div class="bar-row"><span class="nm">act</span><div class="bar" style="width:${w(t.actMs)}px"></div><span class="muted">${t.actMs}ms</span></div>
    <div class="bar-row"><span class="nm">settle</span><div class="bar settle" style="width:${w(t.settleMs)}px"></div><span class="muted">${t.settleMs}ms</span></div>
    <div class="bar-row"><span class="nm">snapshot</span><div class="bar snap" style="width:${w(t.snapMs)}px"></div><span class="muted">${t.snapMs}ms</span></div>` : '<div class="muted">—</div>';
  const o = s.observe;
  const obs = o ? `<span class="tag ${esc(o.danger)}">danger: ${esc(o.danger)}</span><span class="tag">effect: ${esc(o.effect)}</span>${o.unreachable ? '<span class="tag" style="color:var(--bad)">unreachable</span>' : ''}<div>${esc(o.purpose) || '<span class="muted">—</span>'}</div>` : '<div class="muted">no observation (node-loop run)</div>';
  const err = s.error ? `<h5>error</h5><div class="mono" style="color:var(--bad)">${esc(s.error)}</div>` : '';
  return `<div class="stepdetail">${err}<h5>caused · control → endpoint</h5>${reqs}<div class="muted" style="margin-top:4px">revealed ${s.revealed} instance(s)${s.external ? ' · external link, not fired' : ''}</div>
    <h5>speed</h5>${bars}<h5>observation</h5>${obs}</div>`;
}
function renderSteps() {
  const list = $('#stepsList');
  if (!S.steps.length) { list.innerHTML = '<div class="empty">нет актов</div>'; return; }
  list.innerHTML = S.steps.map((s, idx) => {
    const sep = s.routeStart ? `<div class="routelbl">${esc(s.route)}</div>` : '';
    const lbl = `${esc(s.role || '?')} ${esc(JSON.stringify(s.name || ''))}${s.error ? ' · ' + esc(s.error.split(':')[0]) : ''}`;
    const det = idx === S.i ? stepDetailHtml(s) : '';
    return `${sep}<div class="steprow ${idx === S.i ? 'sel' : ''} ${s.error ? 'err' : ''}" data-i="${idx}">
      <div class="line"><span class="n">${idx + 1}</span><span class="lbl">${lbl}</span></div>${det}</div>`;
  }).join('');
  list.querySelectorAll('.steprow').forEach((el) => el.onclick = () => setStep(Number(el.dataset.i)));
  const sel = list.querySelector('.steprow.sel'); if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function renderStrip() {
  const track = $('#track'), count = S.steps.length;
  track.querySelectorAll('.pdot, .sep').forEach((n) => n.remove());
  S.steps.forEach((s, idx) => {
    if (s.routeStart && idx > 0) {
      const mid = (dotLeftPct(idx, count) + dotLeftPct(idx - 1, count)) / 2;
      const sep = document.createElement('div'); sep.className = 'sep'; sep.style.left = mid + '%';
      sep.innerHTML = `<span class="rl">${esc(s.route)}</span>`; track.appendChild(sep);
    }
    const d = document.createElement('div');
    d.className = 'pdot ' + dotClass(s) + (idx === S.i ? ' cur' : '');
    d.style.left = dotLeftPct(idx, count) + '%'; d.dataset.i = idx;
    d.onclick = (e) => { e.stopPropagation(); setStep(idx); };
    track.appendChild(d);
  });
  renderCursor(); renderReadout();
}
function renderCursor() {
  const count = S.steps.length, ph = $('#playhead');
  if (!count) { ph.style.display = 'none'; return; }
  ph.style.display = 'block'; ph.style.left = dotLeftPct(S.i, count) + '%';
  $('#track').querySelectorAll('.pdot').forEach((d) => d.classList.toggle('cur', Number(d.dataset.i) === S.i));
}
function renderReadout() {
  const s = S.steps[S.i];
  $('#readout').textContent = s ? `seq ${s.seq} · t${s.templateId} · ${S.i + 1}/${S.steps.length}` : '—';
}

function shotUrl(rel) { return api(`/api/runs/${S.runId}/${rel}`); }
function renderStage() {
  const wrap = $('#stageWrap'), s = S.steps[S.i];
  $('#stageTitle').textContent = s ? `act [${s.templateId}] ${JSON.stringify(s.name || '')} · ${s.route}` : '—';
  if (!s) { wrap.innerHTML = '<div class="empty">нет шага</div>'; return; }
  if (s.error) { wrap.innerHTML = `<div class="placard err">акт упал<br><span class="mono">${esc(s.error)}</span><br><span class="muted">кадр не снят · засчитан unreachable</span></div>`; return; }
  const sh = s.shots || {}, rel = S.frame === 'after' ? sh.after : sh.before;
  if (!rel) { wrap.innerHTML = '<div class="placard">нет скриншота для этого кадра</div>'; return; }
  wrap.innerHTML = `<div class="frame"><div class="box" id="rbox"></div><img id="stageImg" src="${shotUrl(rel)}" alt="frame"></div>`;
  const img = $('#stageImg'); img.onclick = () => { $('#lbImg').src = img.src; $('#lb').classList.add('open'); };
  img.onload = placeBox; if (img.complete) placeBox();
}
function placeBox() {
  const s = S.steps[S.i], img = $('#stageImg'), box = $('#rbox');
  if (!img || !box) return;
  const sh = s && s.shots;
  if (S.frame !== 'before' || !sh || !sh.rect || !sh.viewport) { box.style.display = 'none'; return; }
  const b = boxFromRect(sh.rect, sh.viewport, img.clientWidth, img.clientHeight);
  if (!b) { box.style.display = 'none'; return; }
  box.style.left = b.left + 'px'; box.style.top = b.top + 'px'; box.style.width = b.width + 'px'; box.style.height = b.height + 'px'; box.style.display = 'block';
}

function setStep(i) { S.i = clampIndex(i, S.steps.length); renderCursor(); renderReadout(); renderSteps(); renderStage(); }

/* ---- scrub interaction ---- */
let dragging = false, raf = 0;
function scrubTo(clientX) {
  const rect = $('#track').getBoundingClientRect();
  const i = indexFromClientX(clientX, rect.left, rect.width, S.steps.length);
  if (i === S.i) return;
  S.i = i; renderCursor(); renderReadout();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(() => { renderSteps(); renderStage(); });
}
const track = $('#track');
track.addEventListener('pointerdown', (e) => { if (!S.steps.length) return; dragging = true; track.setPointerCapture(e.pointerId); scrubTo(e.clientX); $('#tip').style.display = 'none'; });
track.addEventListener('pointermove', (e) => {
  if (dragging) { scrubTo(e.clientX); return; }
  if (!S.steps.length) return;
  const rect = track.getBoundingClientRect(), i = indexFromClientX(e.clientX, rect.left, rect.width, S.steps.length), s = S.steps[i];
  const tip = $('#tip'); tip.style.display = 'block'; tip.style.left = dotLeftPct(i, S.steps.length) + '%';
  tip.textContent = `${i + 1}. t${s.templateId} ${s.name || s.role} · ${s.route}`;
});
track.addEventListener('pointerup', () => { dragging = false; });
track.addEventListener('pointerleave', () => { $('#tip').style.display = 'none'; });

/* ---- tabs + wiring ---- */
function setTab(t) {
  S.tab = t;
  $('#tabs').querySelectorAll('button').forEach((b) => b.classList.toggle('on', b.dataset.tab === t));
  const tests = t === 'tests';
  ['#bodyGrid', '#strip', '#kpis'].forEach((sel) => $(sel).classList.toggle('hide', tests));
  $('#testsView').classList.toggle('hide', !tests);
}
$('#tabs').querySelectorAll('button').forEach((b) => b.onclick = () => setTab(b.dataset.tab));
$('#prev').onclick = () => setStep(S.i - 1);
$('#next').onclick = () => setStep(S.i + 1);
$('#refresh').onclick = loadRuns;
$('#lb').onclick = () => $('#lb').classList.remove('open');
$('#tLeft').onclick = () => $('#bodyGrid').classList.toggle('no-left');
$('#tRight').onclick = () => $('#bodyGrid').classList.toggle('no-right');
$('#frameSel').querySelectorAll('button').forEach((b) => b.onclick = () => {
  S.frame = b.dataset.frame; $('#frameSel').querySelectorAll('button').forEach((x) => x.classList.toggle('on', x === b)); renderStage();
});
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || S.tab !== 'runs') return;
  if (e.key === 'ArrowLeft') { setStep(S.i - 1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { setStep(S.i + 1); e.preventDefault(); }
  else if (e.key === 'Home') { setStep(0); e.preventDefault(); }
  else if (e.key === 'End') { setStep(S.steps.length - 1); e.preventDefault(); }
  else if (e.key === 'f') { S.frame = S.frame === 'before' ? 'after' : 'before'; $('#frameSel').querySelectorAll('button').forEach((x) => x.classList.toggle('on', x.dataset.frame === S.frame)); renderStage(); }
});
window.addEventListener('resize', placeBox);

function tick() { if ($('#autoref').checked) loadRuns().catch(() => {}); }
loadRuns().catch((e) => { $('#runsList').innerHTML = `<div class="empty">ошибка: ${esc(e.message)}</div>`; });
setInterval(tick, 2500);
</script>
</body>
</html>
