<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bughunter · Phase-1 debug</title>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --panel2: #1c2330; --line: #2a3240;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --good: #3fb950;
    --warn: #d29922; --bad: #f85149; --mut: #6e7681;
    --route: #58a6ff; --frontier: #a371f7; --act: #3fb950; --observe: #d29922;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--fg); }
  code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px;
           background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .sub { color: var(--dim); font-size: 12px; }
  select, button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
                   border-radius: 6px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
  button:hover, select:hover { border-color: var(--accent); }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.running { background: rgba(88,166,255,.15); color: var(--accent); }
  .badge.done { background: rgba(63,185,80,.15); color: var(--good); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.live { background: var(--good); box-shadow: 0 0 0 0 rgba(63,185,80,.6); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(63,185,80,.5); } 70% { box-shadow: 0 0 0 6px rgba(63,185,80,0); } }
  .kpis { display: flex; gap: 10px; padding: 12px 16px; flex-wrap: wrap; background: var(--bg); }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
         padding: 8px 14px; min-width: 92px; }
  .kpi .v { font-size: 20px; font-weight: 700; }
  .kpi .l { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  nav.tabs { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--bg); }
  nav.tabs button { border: none; border-bottom: 2px solid transparent; border-radius: 0;
                    background: none; padding: 9px 14px; color: var(--dim); }
  nav.tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
  main { padding: 14px 16px; }
  .panel { display: none; } .panel.active { display: block; }
  /* Walk */
  .walk { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
  .timeline { max-height: 72vh; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; }
  .ev { display: flex; gap: 8px; padding: 7px 10px; border-bottom: 1px solid var(--line);
        cursor: pointer; align-items: baseline; }
  .ev:hover { background: var(--panel2); } .ev.sel { background: rgba(88,166,255,.10); }
  .ev .seq { color: var(--mut); font-size: 11px; min-width: 24px; }
  .ev .diamond { width: 9px; height: 9px; transform: rotate(45deg); flex: 0 0 auto; margin-top: 3px; }
  .ev .lbl { flex: 1; min-width: 0; }
  .ev .lbl b { font-weight: 600; } .ev .lbl .meta { color: var(--dim); font-size: 11px; }
  .k-route .diamond { background: var(--route); } .k-frontier .diamond { background: var(--frontier); }
  .k-act .diamond { background: var(--act); } .k-observe .diamond { background: var(--observe); }
  .detail { border: 1px solid var(--line); border-radius: 8px; padding: 16px; min-height: 200px; }
  .detail h3 { margin: 0 0 4px; font-size: 14px; }
  .shots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .shot { border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--panel2); }
  .shot .cap { padding: 5px 8px; font-size: 11px; color: var(--dim); border-bottom: 1px solid var(--line); }
  .shot .frame { position: relative; line-height: 0; }
  .shot img { width: 100%; display: block; cursor: zoom-in; }
  .shot .box { position: absolute; border: 2px solid var(--bad); box-shadow: 0 0 0 2px rgba(248,81,73,.3); pointer-events: none; }
  .reqs { margin: 10px 0; } .reqs .r { padding: 4px 0; border-bottom: 1px solid var(--line); }
  .method { display: inline-block; min-width: 42px; font-weight: 700; font-size: 11px; }
  .m-GET { color: var(--good); } .m-POST { color: var(--warn); } .m-PUT, .m-PATCH { color: var(--accent); }
  .m-DELETE { color: var(--bad); }
  .bars { margin: 10px 0; } .bar-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .bar-row .name { width: 60px; color: var(--dim); font-size: 11px; }
  .bar { height: 12px; background: var(--accent); border-radius: 3px; min-width: 2px; }
  .bar.settle { background: var(--warn); } .bar.snap { background: var(--frontier); }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px;
         margin-right: 5px; background: var(--panel2); border: 1px solid var(--line); }
  .tag.danger-safe { color: var(--good); } .tag.danger-destructive, .tag.danger-auth, .tag.danger-payment { color: var(--bad); }
  .muted { color: var(--dim); }
  /* Graph */
  .scrub { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .scrub input[type=range] { flex: 1; }
  .route-block { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .route-block > .head { padding: 8px 12px; background: var(--panel); font-weight: 600; }
  .ctrl { padding: 7px 12px; border-top: 1px solid var(--line); }
  .ctrl .arrow { color: var(--mut); margin: 0 6px; }
  .endpoint { color: var(--accent); }
  /* Log */
  .logtable { width: 100%; border-collapse: collapse; }
  .logtable td { padding: 5px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .logtable .j { white-space: pre-wrap; word-break: break-word; color: var(--dim); font-size: 11px; }
  .filters { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  /* Lightbox */
  #lb { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; z-index: 50;
        align-items: center; justify-content: center; padding: 24px; }
  #lb.open { display: flex; } #lb img { max-width: 96vw; max-height: 92vh; border: 1px solid var(--line); }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>bughunter</h1><span class="sub">Phase-1 debug capture</span>
  <select id="runPick" title="run"></select>
  <span id="runTarget" class="sub mono"></span>
  <span id="runStatus"></span>
  <label class="sub"><input type="checkbox" id="autoref" checked> live</label>
  <button id="refresh">↻ refresh</button>
</header>
<div class="kpis" id="kpis"></div>
<nav class="tabs">
  <button data-tab="walk" class="active">Walk</button>
  <button data-tab="graph">Graph</button>
  <button data-tab="log">Log</button>
  <button data-tab="speed">Speed</button>
</nav>
<main>
  <section class="panel active" id="tab-walk">
    <div class="walk">
      <div class="timeline" id="timeline"></div>
      <div class="detail" id="detail"><div class="empty">Select a step in the timeline.</div></div>
    </div>
  </section>
  <section class="panel" id="tab-graph">
    <div class="scrub">
      <span class="muted">step</span>
      <input type="range" id="graphSeq" min="0" max="0" value="0">
      <span id="graphSeqLbl" class="mono muted">—</span>
    </div>
    <div id="graphBody"></div>
  </section>
  <section class="panel" id="tab-log">
    <div class="filters">
      <label class="sub"><input type="checkbox" class="kf" value="route" checked> route</label>
      <label class="sub"><input type="checkbox" class="kf" value="frontier.emit" checked> frontier</label>
      <label class="sub"><input type="checkbox" class="kf" value="act" checked> act</label>
      <label class="sub"><input type="checkbox" class="kf" value="observe" checked> observe</label>
      <label class="sub" style="margin-left:auto"><input type="checkbox" id="expand"> expand payloads</label>
    </div>
    <table class="logtable"><tbody id="logBody"></tbody></table>
  </section>
  <section class="panel" id="tab-speed"><div id="speedBody"></div></section>
</main>
<div id="lb"><img id="lbImg" alt=""></div>
<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const state = { runId: null, run: null, events: [], sel: null, tab: 'walk', graphSeqs: [] };

// The access token rides in the URL the operator opened (…/?t=<token>); every /api call
// (including <img> screenshot/graph fetches) must carry it or the server 403s.
const TOKEN = new URLSearchParams(location.search).get('t') || '';
const api = (p) => p + (p.includes('?') ? '&' : '?') + 't=' + encodeURIComponent(TOKEN);

async function jget(url) { const r = await fetch(api(url)); if (!r.ok) throw new Error(r.status); return r.json(); }

async function loadRuns() {
  const { runs } = await jget('/api/runs');
  const pick = $('#runPick');
  const prev = state.runId;
  pick.innerHTML = runs.map((r) => `<option value="${esc(r.id)}">${esc(r.id)}${r.status === 'running' ? ' ●' : ''}</option>`).join('');
  if (!runs.length) { $('#kpis').innerHTML = '<div class="empty">No runs captured yet. Start one with /recon.</div>'; return; }
  const keep = runs.find((r) => r.id === prev);
  state.runId = keep ? prev : runs[0].id;
  pick.value = state.runId;
  await loadRun();
}

async function loadRun() {
  if (!state.runId) return;
  const data = await jget('/api/runs/' + state.runId);
  state.run = data.run; state.events = data.events || [];
  state.graphSeqs = state.events.filter((e) => e.kind === 'act' || e.kind === 'observe' || e.kind === 'route').map((e) => e.seq);
  renderHeader(); renderKpis(); renderTimeline(); renderLog(); renderSpeed(); renderGraphControls();
  if (state.sel == null && state.events.length) selectEvent(lastActSeq());
  else if (state.sel != null) renderDetail();
}

function lastActSeq() {
  const acts = state.events.filter((e) => e.kind === 'act');
  return acts.length ? acts[acts.length - 1].seq : state.events[state.events.length - 1].seq;
}

function renderHeader() {
  const r = state.run || {};
  $('#runTarget').textContent = r.target || '';
  const live = r.status === 'running';
  $('#runStatus').innerHTML = `<span class="badge ${live ? 'running' : 'done'}">${live ? '<span class="dot live"></span>running' : 'done'}</span>`;
}

function renderKpis() {
  const acts = state.events.filter((e) => e.kind === 'act');
  const stats = (state.run && state.run.stats) || lastStats();
  const edges = new Set();
  let tActMs = 0, nAct = 0;
  for (const a of acts) {
    (a.payload.requests || []).forEach((rq) => edges.add(rq.method + ' ' + rq.urlPattern));
    if (a.payload.timings && typeof a.payload.timings.actMs === 'number') { tActMs += a.payload.timings.actMs; nAct++; }
  }
  const kpi = (v, l) => `<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('#kpis').innerHTML = [
    kpi(stats.explored ?? '–', 'explored'),
    kpi(stats.discovered ?? '–', 'discovered'),
    kpi(stats.unreachable ?? '–', 'unreachable'),
    kpi(stats.remaining ?? '–', 'remaining'),
    kpi(stats.routes ?? '–', 'routes'),
    kpi(acts.length, 'acts'),
    kpi(edges.size, 'causal edges'),
    kpi(nAct ? Math.round(tActMs / nAct) + 'ms' : '–', 'avg act'),
  ].join('');
}

function lastStats() {
  for (let i = state.events.length - 1; i >= 0; i--) {
    const e = state.events[i];
    if (e.kind === 'frontier.emit' && e.payload.stats) return e.payload.stats;
  }
  return {};
}

function evLabel(e) {
  const p = e.payload || {};
  if (e.kind === 'route') return `<b>→ ${esc(p.route)}</b> <span class="meta">${p.total ?? 0} controls · ${p.new ?? 0} new${p.overlayDismissed ? ' · overlay cleared' : ''}</span>`;
  if (e.kind === 'frontier.emit') return `<b>frontier</b> <span class="meta">${(p.candidates || []).length} candidates · ${p.stats ? p.stats.remaining + ' remaining' : ''}</span>`;
  if (e.kind === 'act') {
    if (p.error) return `<b>act [${p.templateId}]</b> ${esc(p.name || p.role || '')} <span class="meta" style="color:var(--bad)">failed</span>`;
    const reqs = (p.requests || []).length;
    return `<b>act [${p.templateId}]</b> ${esc(p.name || p.role || '')} <span class="meta">${reqs} req${p.external ? ' · external' : ''} · +${p.revealed || 0}</span>`;
  }
  if (e.kind === 'observe') return `<b>observe [${p.templateId}]</b> <span class="meta">${esc(p.danger || '?')}/${esc(p.effect || '?')}</span>`;
  return `<b>${esc(e.kind)}</b>`;
}

function renderTimeline() {
  const tl = $('#timeline');
  if (!state.events.length) { tl.innerHTML = '<div class="empty">no events</div>'; return; }
  tl.innerHTML = state.events.map((e) => `
    <div class="ev k-${e.kind.replace('.', '-')} ${e.seq === state.sel ? 'sel' : ''}" data-seq="${e.seq}">
      <span class="seq">${e.seq}</span><span class="diamond"></span>
      <span class="lbl">${evLabel(e)}</span>
    </div>`).join('');
  tl.querySelectorAll('.ev').forEach((el) => el.onclick = () => selectEvent(Number(el.dataset.seq)));
}

function selectEvent(seq) { state.sel = seq; renderTimeline(); renderDetail(); }

function shotBox(p) {
  // Place the target rect over the "before" frame independent of devicePixelRatio: the shot
  // covers exactly the CSS viewport box, so rect maps as rect.x * imgClientWidth / viewport.width.
  const s = p.shots || {};
  // s.before/s.after are run-dir-relative paths ("shots/t1-before.png"); the /shots/:file
  // route lives directly under the run, so the rel path appends cleanly onto /api/runs/:id/.
  // api() adds the access token so the <img> load is not 403'd.
  const beforeImg = s.before ? api(`/api/runs/${state.runId}/${s.before}`) : null;
  const afterImg = s.after ? api(`/api/runs/${state.runId}/${s.after}`) : null;
  const boxAttr = (s.rect && s.viewport) ? ` data-rect='${esc(JSON.stringify(s.rect))}' data-vp='${esc(JSON.stringify(s.viewport))}'` : '';
  const cell = (img, cap, withBox) => img ? `
    <div class="shot"><div class="cap">${cap}</div>
      <div class="frame">${withBox ? `<div class="box" style="display:none"></div>` : ''}
        <img src="${img}"${withBox ? boxAttr : ''} alt="${cap}"></div></div>` : '';
  if (!beforeImg && !afterImg) return '';
  return `<div class="shots">${cell(beforeImg, 'before (target boxed)', true)}${cell(afterImg, 'after (effect)', false)}</div>`;
}

function placeBoxes() {
  document.querySelectorAll('.shot img[data-rect]').forEach((img) => {
    const box = img.parentElement.querySelector('.box');
    if (!box) return;
    const draw = () => {
      try {
        const rect = JSON.parse(img.dataset.rect), vp = JSON.parse(img.dataset.vp);
        if (!rect || !vp || !vp.width) return;
        const sx = img.clientWidth / vp.width, sy = img.clientHeight / vp.height;
        box.style.left = (rect.x * sx) + 'px'; box.style.top = (rect.y * sy) + 'px';
        box.style.width = (rect.width * sx) + 'px'; box.style.height = (rect.height * sy) + 'px';
        box.style.display = 'block';
      } catch {}
    };
    if (img.complete) draw(); else img.onload = draw;
  });
}

function renderDetail() {
  const e = state.events.find((x) => x.seq === state.sel);
  const d = $('#detail');
  if (!e) { d.innerHTML = '<div class="empty">Select a step.</div>'; return; }
  const p = e.payload || {};
  if (e.kind === 'act' && p.error) {
    d.innerHTML = `<h3>act · template [${p.templateId}] <span style="color:var(--bad)">failed</span></h3>
      <div class="muted">${esc(p.role || '')} ${esc(JSON.stringify(p.name || ''))} on <span class="mono">${esc(p.route)}</span></div>
      <p><b>error:</b> <span class="mono" style="color:var(--bad)">${esc(p.error)}</span></p>
      <p class="muted">This control was drained from the frontier and counted as unreachable, not as coverage.</p>`;
    return;
  }
  if (e.kind === 'act') {
    const reqs = (p.requests || []).map((r) => `<div class="r"><span class="method m-${esc(r.method)}">${esc(r.method)}</span> <span class="endpoint mono">${esc(r.urlPattern)}</span></div>`).join('') || '<div class="muted">no request caused</div>';
    const t = p.timings || {}; const w = (ms) => Math.max(2, Math.min(600, (ms || 0) * 1.5));
    const bars = t.actMs != null ? `<div class="bars">
        <div class="bar-row"><span class="name">act</span><div class="bar" style="width:${w(t.actMs)}px"></div><span class="muted">${t.actMs}ms</span></div>
        <div class="bar-row"><span class="name">settle</span><div class="bar settle" style="width:${w(t.settleMs)}px"></div><span class="muted">${t.settleMs}ms</span></div>
        <div class="bar-row"><span class="name">snapshot</span><div class="bar snap" style="width:${w(t.snapMs)}px"></div><span class="muted">${t.snapMs}ms</span></div>
      </div>` : '';
    d.innerHTML = `<h3>act · template [${p.templateId}]</h3>
      <div class="muted">${esc(p.role || '')} ${esc(JSON.stringify(p.name || ''))} on <span class="mono">${esc(p.route)}</span>${p.external ? ' · <span style="color:var(--bad)">external link (not fired)</span>' : ''}</div>
      ${shotBox(p)}
      <div><b>caused (control → endpoint):</b><div class="reqs">${reqs}</div></div>
      <div><b>revealed:</b> ${p.revealed || 0} new instance(s)</div>
      ${bars}`;
    placeBoxes();
  } else if (e.kind === 'observe') {
    d.innerHTML = `<h3>observe · template [${p.templateId}]</h3>
      <div class="muted mono">${esc(p.route || '')}</div>
      <p><span class="tag danger-${esc(p.danger)}">danger: ${esc(p.danger)}</span>
         <span class="tag">effect: ${esc(p.effect)}</span>
         <span class="tag">acted: ${p.acted}</span>
         ${p.unreachable ? '<span class="tag" style="color:var(--bad)">unreachable</span>' : ''}
         ${p.stateChange ? '<span class="tag">state-change</span>' : ''}</p>
      <p><b>purpose:</b> ${esc(p.purpose) || '<span class="muted">—</span>'}</p>`;
  } else if (e.kind === 'route') {
    d.innerHTML = `<h3>route · ${esc(p.route)}</h3>
      <p>${p.total ?? 0} controls present · ${p.new ?? 0} new · ${p.opaque ?? 0} opaque region(s)${p.overlayDismissed ? ` · overlay cleared (<span class="mono">${esc(p.overlayDismissed)}</span>)` : ''}</p>`;
  } else if (e.kind === 'frontier.emit') {
    const rows = (p.candidates || []).map((c) => `<div class="ctrl">[${c.templateId}] <b>${esc(c.role || '?')}</b> ${esc(JSON.stringify(c.name || ''))} <span class="muted mono">${esc(c.route)}</span></div>`).join('');
    d.innerHTML = `<h3>frontier — next receptive field</h3>
      <div class="muted">${p.stats ? `${p.stats.explored}/${p.stats.discovered} explored · ${p.stats.remaining} remaining` : ''}</div>
      <div class="route-block" style="margin-top:10px">${rows || '<div class="ctrl muted">drained</div>'}</div>`;
  }
}

/* ---- Graph tab ---- */
function renderGraphControls() {
  const r = $('#graphSeq');
  const seqs = state.graphSeqs;
  r.max = String(Math.max(0, seqs.length - 1));
  r.value = r.max;
  r.oninput = () => renderGraph();
  renderGraph();
}
async function renderGraph() {
  const seqs = state.graphSeqs;
  const body = $('#graphBody');
  if (!seqs.length) { body.innerHTML = '<div class="empty">no graph snapshots yet</div>'; $('#graphSeqLbl').textContent = '—'; return; }
  const idx = Math.min(Number($('#graphSeq').value) || 0, seqs.length - 1);
  const seq = seqs[idx];
  $('#graphSeqLbl').textContent = 'seq ' + seq;
  let g;
  try { g = await jget(`/api/runs/${state.runId}/graph/${seq}`); } catch { body.innerHTML = '<div class="empty">snapshot unavailable</div>'; return; }
  const causesOf = (tid) => (g.edges || []).filter((e) => e.from === `element:${tid}` && e.type === 'triggers').map((e) => String(e.to).replace('request:', ''));
  const els = Object.values(g.elements || {});
  const routes = Object.keys(g.routes || {}).sort();
  body.innerHTML = routes.map((route) => {
    const ctrls = els.filter((n) => n.route === route).sort((a, b) => a.templateId - b.templateId);
    const rows = ctrls.map((n) => {
      const sem = n.semantics || {};
      const loc = n.locator && n.locator.type ? `<span class="tag">loc=${esc(n.locator.type)}</span>` : '';
      const dg = sem.danger ? `<span class="tag danger-${esc(sem.danger)}">${esc(sem.danger)}</span>` : '';
      const ef = sem.effect ? `<span class="tag">${esc(sem.effect)}</span>` : (n.explored ? '' : '<span class="tag muted">unexplored</span>');
      const un = n.unreachable ? '<span class="tag" style="color:var(--bad)">unreachable</span>' : '';
      const causes = causesOf(n.templateId);
      const ep = causes.length ? `<span class="arrow">→</span>${causes.map((c) => `<span class="endpoint mono">${esc(c)}</span>`).join(', ')}` : '';
      const inst = n.instances && n.instances.length > 1 ? ` ×${n.instances.length}` : '';
      return `<div class="ctrl">[${n.templateId}] <b>${esc(n.role || '?')}</b> ${esc(JSON.stringify(n.name || ''))}${inst} ${loc}${dg}${ef}${un} ${ep}</div>`;
    }).join('');
    return `<div class="route-block"><div class="head mono">${esc(route)} <span class="muted">· ${ctrls.length} control(s)</span></div>${rows}</div>`;
  }).join('') || '<div class="empty">empty graph</div>';
}

/* ---- Log tab ---- */
function renderLog() {
  const on = new Set([...document.querySelectorAll('.kf:checked')].map((c) => c.value));
  const expand = $('#expand').checked;
  const rows = state.events.filter((e) => on.has(e.kind)).map((e) => `
    <tr><td class="muted mono">${e.seq}</td>
        <td><span class="tag">${esc(e.kind)}</span></td>
        <td>${evLabel(e)}${expand ? `<div class="j">${esc(JSON.stringify(e.payload))}</div>` : ''}</td></tr>`).join('');
  $('#logBody').innerHTML = rows || '<tr><td class="empty" colspan="3">no events</td></tr>';
}

/* ---- Speed tab ---- */
function renderSpeed() {
  const acts = state.events.filter((e) => e.kind === 'act' && e.payload.timings);
  if (!acts.length) { $('#speedBody').innerHTML = '<div class="empty">no timed acts yet</div>'; return; }
  const tot = acts.reduce((s, a) => s + (a.payload.timings.actMs + a.payload.timings.settleMs + a.payload.timings.snapMs), 0);
  const maxTot = Math.max(...acts.map((a) => a.payload.timings.actMs + a.payload.timings.settleMs + a.payload.timings.snapMs));
  const rows = acts.map((a) => {
    const t = a.payload.timings; const sum = t.actMs + t.settleMs + t.snapMs;
    const pct = (ms) => (ms / maxTot * 100);
    return `<div class="bar-row" style="align-items:stretch">
      <span class="name mono">[${a.payload.templateId}]</span>
      <div style="flex:1; display:flex; height:16px; border-radius:3px; overflow:hidden; min-width:2px">
        <div class="bar" style="width:${pct(t.actMs)}%; border-radius:0" title="act ${t.actMs}ms"></div>
        <div class="bar settle" style="width:${pct(t.settleMs)}%; border-radius:0" title="settle ${t.settleMs}ms"></div>
        <div class="bar snap" style="width:${pct(t.snapMs)}%; border-radius:0" title="snap ${t.snapMs}ms"></div>
      </div><span class="muted">${sum}ms</span></div>`;
  }).join('');
  $('#speedBody').innerHTML = `
    <div class="filters"><span class="tag"><span class="bar" style="display:inline-block;width:10px;height:10px"></span> act</span>
      <span class="tag"><span class="bar settle" style="display:inline-block;width:10px;height:10px"></span> settle</span>
      <span class="tag"><span class="bar snap" style="display:inline-block;width:10px;height:10px"></span> snapshot</span>
      <span style="margin-left:auto" class="muted">total ${tot}ms · avg ${Math.round(tot / acts.length)}ms/act</span></div>
    ${rows}`;
}

/* ---- wiring ---- */
document.querySelectorAll('nav.tabs button').forEach((b) => b.onclick = () => {
  state.tab = b.dataset.tab;
  document.querySelectorAll('nav.tabs button').forEach((x) => x.classList.toggle('active', x === b));
  document.querySelectorAll('.panel').forEach((p) => p.classList.toggle('active', p.id === 'tab-' + state.tab));
  if (state.tab === 'graph') renderGraph();
});
$('#runPick').onchange = (e) => { state.runId = e.target.value; state.sel = null; loadRun(); };
$('#refresh').onclick = loadRuns;
document.querySelectorAll('.kf').forEach((c) => c.onchange = renderLog);
$('#expand').onchange = renderLog;
$('#lb').onclick = () => $('#lb').classList.remove('open');
document.addEventListener('click', (e) => { if (e.target.matches('.shot img')) { $('#lbImg').src = e.target.src; $('#lb').classList.add('open'); } });
window.addEventListener('resize', placeBoxes);

let timer = null;
function tick() { if ($('#autoref').checked) loadRuns().catch(() => {}); }
$('#autoref').onchange = () => {};
loadRuns().catch((e) => { $('#kpis').innerHTML = `<div class="empty">failed to load: ${esc(e.message)}</div>`; });
timer = setInterval(tick, 2500);
</script>
</body>
</html>
